name: Security scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly (Mon 06:00 UTC). Dependency CVEs are disclosed over time, so re-scan unchanged
    # code on a cadence — not only when something is pushed.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write # required to upload SARIF to code scanning

jobs:
  scan-external-assets:
    name: Scan for unsafe external assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      # Fails the job (exit 1) if any malicious/unallowlisted/un-SRI'd external
      # asset is found. The SARIF file is written even on failure.
      - name: Run external-asset scanner
        run: python scripts/scan_external_assets.py --sarif results.sarif

      # Upload regardless of the scan result so findings show up under
      # Security -> Code scanning alerts (public repos / GitHub Advanced Security).
      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: external-assets

  audit-dependencies:
    name: Audit dependencies for known CVEs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      # Audit the locked *production* dependencies (the set actually shipped, dev tooling
      # excluded). --frozen fails if the lockfile is stale rather than silently resolving anew.
      - name: Export locked production dependencies
        run: uv export --frozen --no-dev --no-emit-project --format requirements-txt -o requirements.txt

      # Fails the job if any dependency has a known vulnerability. For an advisory with no fix
      # available yet, accept it explicitly with `--ignore-vuln <ID>`.
      - name: pip-audit
        run: uvx pip-audit -r requirements.txt

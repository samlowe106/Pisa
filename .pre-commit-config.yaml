default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-illegal-windows-names
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: end-of-file-fixer
      - id: name-tests-test
        args: [--django]  # this project uses Django's test_*.py convention, not *_test.py
        exclude: (^|/)tests/utils\.py$  # shared test helpers, not a test module itself
      - id: pretty-format-json
        args: [--autofix]
        files: \.json$
      - id: sort-simple-yaml
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff
        name: ruff (lint + autofix)
        args: [--fix]

  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
        args: [--safe]

  - repo: local
    hooks:
      # mypy runs from the project venv (language: system) so the django-stubs plugin can
      # import pisa.settings + the models. SECRET_KEY is only needed to import settings; its
      # value is irrelevant to type checking. pass_filenames: false → always check the whole
      # package, so a change in one module is re-checked against everything that imports it.
      - id: mypy
        name: mypy + django-stubs
        entry: env SECRET_KEY=mypy-typecheck uv run mypy apps pisa
        language: system
        types: [python]
        pass_filenames: false
      - id: scan-external-assets
        name: Unsafe external asset scan
        entry: python scripts/scan_external_assets.py
        language: system
        files: \.(html|htm|js)$

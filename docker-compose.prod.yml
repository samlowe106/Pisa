# Production stack for self-hosting Pisa on your own domain.
#
#   1. Point your domain's DNS A/AAAA record at this server.
#   2. Copy .env.example to .env and fill in SECRET_KEY, PISA_DOMAIN, DEBUG=False.
#   3. docker compose -f docker-compose.prod.yml up -d --build
#
# Caddy then fetches a TLS certificate for PISA_DOMAIN automatically. SQLite and uploaded
# media persist in ./data and ./media on the host (back those up).
services:
  web:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    env_file: .env
    # Untrusted Lean runs inside a bubblewrap sandbox (LEAN_SANDBOX_WRAPPER, on by default),
    # which needs unprivileged user namespaces — blocked by Docker's default seccomp profile —
    # mount() inside them — blocked by Docker's default AppArmor profile ("bwrap: Failed to
    # make / slave: Permission denied") — and a fresh procfs mount for the new pid namespace,
    # which the kernel refuses while Docker masks /proc paths ("bwrap: Can't mount proc on
    # /newroot/proc"). All three grants are required; bubblewrap then isolates Lean (no
    # network / read-only filesystem). The app process is trusted; tighter custom profiles are
    # a future refinement (see TODO.md).
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
      - systempaths=unconfined
    environment:
      # Container paths for the baked-in Lean toolchain (the shim-free binary the Dockerfile
      # symlinks; overrides any host paths from .env).
      LEAN_EXECUTABLE: /usr/local/bin/lean-direct
      LEAN_LSP_CMD: /usr/local/bin/lean-direct --server
    volumes:
      - ./data:/app/data # SQLite database
      - ./media:/app/media # user uploads
    expose:
      - "8000"
    command: daphne -b 0.0.0.0 -p 8000 pisa.asgi:application

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - web
    environment:
      PISA_DOMAIN: ${PISA_DOMAIN:?set PISA_DOMAIN in .env (e.g. lean.school.edu)}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./media:/srv/media:ro # serve uploads directly
      - caddy_data:/data # certificates (don't lose these)
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:

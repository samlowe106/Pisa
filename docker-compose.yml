version: "3.9"

services:
  web:
    build:
      context: .
      target: runtime
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      PYTHONUNBUFFERED: "1"
      # Container paths for Lean. These override the host paths that .env sets (mounted via
      # the volume below); load_dotenv() does not overwrite already-set env vars, so these win.
      LEAN_EXECUTABLE: /root/.elan/bin/lean
      LEAN_LSP_CMD: /root/.elan/bin/lean --server
    stdin_open: true
    tty: true

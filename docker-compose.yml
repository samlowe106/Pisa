services:
  web:
    build:
      context: .
      target: runtime
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    # Lets the default bubblewrap Lean sandbox create its namespaces/mounts (see the prod
    # compose for the rationale) — Docker's default seccomp profile blocks the unshare and
    # its default AppArmor profile blocks the mount calls ("bwrap: Failed to make / slave:
    # Permission denied").
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    volumes:
      - .:/app
    environment:
      PYTHONUNBUFFERED: "1"
      # Container paths for Lean. These override the host paths that .env sets (mounted via
      # the volume below); load_dotenv() does not overwrite already-set env vars, so these win.
      LEAN_EXECUTABLE: /root/.elan/bin/lean
      LEAN_LSP_CMD: /root/.elan/bin/lean --server
    stdin_open: true
    tty: true

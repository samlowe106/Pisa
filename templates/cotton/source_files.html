<c-vars :source_files="None" />
{% if source_files %}
<div class="field">
    <label>Imported Lean source files</label>
    {% for source_file in source_files %}
    <div class="imported-source-file collapsed">
        <div class="imported-source-file-header">
            <div>
                <strong>{{ source_file.title }}</strong>
                {% if user.is_staff %}
                <span class="meta">({{ source_file.visible|yesno:"Visible,Hidden" }})</span>
                {% endif %}
            </div>
            <button type="button" class="toggle-import" aria-expanded="false" aria-controls="imported-source-{{ source_file.pk }}">Show</button>
        </div>
        <textarea id="imported-source-{{ source_file.pk }}" class="read-only-code" readonly>{{ source_file.content }}</textarea>
    </div>
    {% endfor %}
</div>
{% endif %}

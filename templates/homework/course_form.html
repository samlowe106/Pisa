{% extends 'homework/base.html' %}

{% block title %}{% if object %}Edit{% else %}Create{% endif %} Course – Pisa{% endblock %}

{% block content %}
{% with h=object|yesno:"Edit Course,Create Course" %}<c-page-header :title="h" />{% endwith %}
<c-card>
    <form method="post">
        {% csrf_token %}
        <c-form-fields :form="form" />
        <button class="button" type="submit">Save course</button>
    </form>
</c-card>
{% endblock %}
